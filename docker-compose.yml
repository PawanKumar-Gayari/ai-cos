version: "3.9"

services:

  # ==================================================
  # DJANGO APP
  # ==================================================

  web:

    build: .

    container_name: ai_cos_web

    command: >

      sh -c "

      python manage.py migrate &&

      python manage.py collectstatic --noinput &&

      gunicorn config.wsgi:application

      --bind 0.0.0.0:8000

      --workers 3

      --timeout 300
      "

    volumes:

      - .:/app

      - static_volume:/app/staticfiles

      - media_volume:/app/media

    env_file:

      - .env

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_started

    restart: unless-stopped

    healthcheck:

      test: [

        "CMD",

        "curl",

        "-f",

        "http://localhost:8000/api/monitoring/health/"
      ]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 40s


  # ==================================================
  # NGINX
  # ==================================================

  nginx:

    image: nginx:stable-alpine

    container_name: ai_cos_nginx

    ports:

      - "80:80"

    volumes:

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

      - static_volume:/app/staticfiles

      - media_volume:/app/media

    depends_on:

      - web

    restart: unless-stopped


  # ==================================================
  # CELERY WORKER
  # ==================================================

  celery_worker:

    build: .

    container_name: ai_cos_worker

    command: >

      celery -A config worker

      -l info

      --concurrency=2

    volumes:

      - .:/app

    env_file:

      - .env

    depends_on:

      - redis

      - web

    restart: unless-stopped


  # ==================================================
  # CELERY BEAT
  # ==================================================

  celery_beat:

    build: .

    container_name: ai_cos_beat

    command: >

      celery -A config beat

      -l info

    volumes:

      - .:/app

    env_file:

      - .env

    depends_on:

      - redis

      - web

    restart: unless-stopped


  # ==================================================
  # REDIS
  # ==================================================

  redis:

    image: redis:7-alpine

    container_name: ai_cos_redis

    command: redis-server --appendonly yes

    ports:

      - "6379:6379"

    volumes:

      - redis_data:/data

    restart: unless-stopped


  # ==================================================
  # POSTGRES
  # ==================================================

  postgres:

    image: postgres:16

    container_name: ai_cos_postgres

    environment:

      POSTGRES_DB: ai_cos

      POSTGRES_USER: ai_cos_user

      POSTGRES_PASSWORD: ai_cos_password

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:

      test: [

        "CMD-SHELL",

        "pg_isready -U ai_cos_user"
      ]

      interval: 10s

      timeout: 5s

      retries: 5


  # ==================================================
  # OLLAMA
  # ==================================================

  ollama:

    image: ollama/ollama

    container_name: ai_cos_ollama

    ports:

      - "11434:11434"

    volumes:

      - ollama_data:/root/.ollama

    restart: unless-stopped


# ==================================================
# VOLUMES
# ==================================================

volumes:

  postgres_data:

  redis_data:

  ollama_data:

  static_volume:

  media_volume: