<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Article Renderer</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            color: #1f2937;
            font-family: Inter, Arial, sans-serif;
            line-height: 1.8;
            padding: 40px 20px;
        }

        .container {
            max-width: 950px;
            margin: auto;
        }

        .article-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 50px;
            box-shadow:
                0 4px 10px rgba(0,0,0,0.04),
                0 10px 30px rgba(0,0,0,0.06);
        }

        .article-header {
            margin-bottom: 40px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 25px;
        }

        .article-title {
            font-size: 42px;
            line-height: 1.3;
            font-weight: 800;
            color: #111827;
            margin-bottom: 15px;
        }

        .article-description {
            font-size: 18px;
            color: #6b7280;
        }

        .article-content {
            font-size: 18px;
            color: #374151;
        }

        .article-content h1 {
            font-size: 38px;
            margin-top: 45px;
            margin-bottom: 20px;
            color: #111827;
            line-height: 1.3;
        }

        .article-content h2 {
            font-size: 30px;
            margin-top: 40px;
            margin-bottom: 18px;
            color: #111827;
            line-height: 1.4;
            border-left: 5px solid #2563eb;
            padding-left: 15px;
        }

        .article-content h3 {
            font-size: 24px;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #1f2937;
        }

        .article-content p {
            margin-bottom: 20px;
            color: #374151;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 25px;
            padding-left: 25px;
        }

        .article-content li {
            margin-bottom: 10px;
        }

        .article-content blockquote {
            background: #eff6ff;
            border-left: 5px solid #2563eb;
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
            color: #1e3a8a;
        }

        .article-content code {
            background: #f3f4f6;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 15px;
        }

        .article-content pre {
            background: #111827;
            color: #f9fafb;
            padding: 20px;
            border-radius: 14px;
            overflow-x: auto;
            margin: 25px 0;
        }

        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            overflow: hidden;
            border-radius: 14px;
        }

        .article-content table th {
            background: #2563eb;
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 700;
        }

        .article-content table td {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 14px;
            margin: 25px 0;
        }

        .article-content hr {
            border: none;
            height: 1px;
            background: #e5e7eb;
            margin: 40px 0;
        }

        .article-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 15px;
        }

        @media (max-width: 768px) {

            body {
                padding: 20px 10px;
            }

            .article-card {
                padding: 25px;
            }

            .article-title {
                font-size: 30px;
            }

            .article-content {
                font-size: 16px;
            }

            .article-content h1 {
                font-size: 30px;
            }

            .article-content h2 {
                font-size: 24px;
            }

            .article-content h3 {
                font-size: 20px;
            }
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="article-card">

            <div class="article-header">

                <h1 class="article-title">
                    {{ title }}
                </h1>

                <p class="article-description">
                    {{ meta_description }}
                </p>

            </div>

            <div class="article-content">

                {{ content_html|safe }}

            </div>

            <div class="article-footer">

                Generated by AI COS Engine

            </div>

        </div>

    </div>

</body>
</html>
