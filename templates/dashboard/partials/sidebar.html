<!-- SIMPLE CLEAN SIDEBAR -->

<aside class="
    fixed top-0 left-0 z-40
    w-64 h-screen
    bg-white
    border-r border-gray-200
    hidden lg:flex flex-col
">

    <!-- ================================================= -->
    <!-- LOGO -->
    <!-- ================================================= -->

    <div class="
        px-6 py-6
        border-b border-gray-200
    ">

        <a
            href="{% url 'dashboard-home' %}"
            class="block"
        >

            <h1 class="
                text-3xl font-black
                tracking-tight
                text-gray-900
            ">
                AI COS
            </h1>

            <p class="
                text-sm text-gray-500 mt-1
            ">
                Dashboard
            </p>

        </a>

    </div>

    <!-- ================================================= -->
    <!-- STATUS -->
    <!-- ================================================= -->

    <div class="
        p-5
    ">

        <div class="
            bg-green-50
            border border-green-200
            rounded-3xl
            p-5
        ">

            <div class="
                flex items-center gap-3
                mb-2
            ">

                <div class="
                    w-3 h-3 rounded-full
                    bg-green-500
                "></div>

                <h3 class="
                    font-semibold
                    text-green-700
                ">
                    Infrastructure Online
                </h3>

            </div>

            <p class="
                text-sm text-green-600
            ">
                All systems operational
            </p>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- USER -->
    <!-- ================================================= -->

    <div class="
        px-5 pb-5
    ">

        <div class="
            bg-gray-50
            border border-gray-200
            rounded-3xl
            p-4
            flex items-center gap-4
        ">

            <div class="
                w-14 h-14
                rounded-2xl
                bg-black
                text-white
                flex items-center justify-center
                text-2xl font-bold
            ">

                {{ request.user.username|slice:":1"|upper }}

            </div>

            <div>

                <h4 class="
                    font-bold
                    text-gray-900
                ">

                    {{ request.user.username }}

                </h4>

                <p class="
                    text-sm text-gray-500
                ">
                    Administrator
                </p>

            </div>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- MENU -->
    <!-- ================================================= -->

    <div class="
        flex-1 px-5
    ">

        <nav class="
            flex flex-col gap-2
        ">

            <!-- DASHBOARD -->

            <a
                href="{% url 'dashboard-home' %}"
                class="
                    px-4 py-3
                    rounded-2xl
                    font-medium
                    transition

                    {% if request.path == '/dashboard/' %}
                        bg-gray-100 text-black
                    {% else %}
                        text-gray-600 hover:bg-gray-100
                    {% endif %}
                "
            >
                Dashboard
            </a>

            <!-- GENERATOR -->

            <a
                href="/api/v1/generator/"
                class="
                    px-4 py-3
                    rounded-2xl
                    font-medium
                    transition

                    {% if '/generator/' in request.path %}
                        bg-gray-100 text-black
                    {% else %}
                        text-gray-600 hover:bg-gray-100
                    {% endif %}
                "
            >
                Generator
            </a>

            <!-- PUBLISHER -->

            <a
                href="/api/publisher/"
                class="
                    px-4 py-3
                    rounded-2xl
                    font-medium
                    transition

                    {% if '/publisher/' in request.path %}
                        bg-gray-100 text-black
                    {% else %}
                        text-gray-600 hover:bg-gray-100
                    {% endif %}
                "
            >
                Publisher
            </a>

            <!-- MONITORING -->

            <a
                href="/api/monitoring/"
                class="
                    px-4 py-3
                    rounded-2xl
                    font-medium
                    transition

                    {% if '/monitoring/' in request.path %}
                        bg-gray-100 text-black
                    {% else %}
                        text-gray-600 hover:bg-gray-100
                    {% endif %}
                "
            >
                Monitoring
            </a>

            <!-- ADMIN -->

            <a
                href="/admin/"
                class="
                    px-4 py-3
                    rounded-2xl
                    font-medium
                    text-gray-600
                    hover:bg-gray-100
                    transition
                "
            >
                Admin
            </a>

        </nav>

    </div>

    <!-- ================================================= -->
    <!-- FOOTER -->
    <!-- ================================================= -->

    <div class="
        p-5
        border-t border-gray-200
    ">

        <a
            href="{% url 'logout' %}"
            class="
                w-full
                flex items-center justify-center
                bg-red-50
                border border-red-100
                text-red-600
                rounded-2xl
                px-4 py-3
                font-medium
                hover:bg-red-100
                transition
            "
        >
            Logout
        </a>

    </div>

</aside>

<!-- ===================================================== -->
<!-- MOBILE TOPBAR -->
<!-- ===================================================== -->

<div class="
    lg:hidden
    fixed top-0 left-0 right-0 z-50
    h-16
    bg-white
    border-b border-gray-200
    flex items-center justify-between
    px-5
">

    <a
        href="{% url 'dashboard-home' %}"
        class="block"
    >

        <h2 class="
            text-2xl font-black
            tracking-tight
        ">
            AI COS
        </h2>

    </a>

    <button
        id="mobile-sidebar-button"
        class="
            w-11 h-11
            rounded-2xl
            border border-gray-200
            bg-white
        "
    >
        ☰
    </button>

</div>

<!-- ===================================================== -->
<!-- MOBILE SIDEBAR -->
<!-- ===================================================== -->

<div
    id="mobile-sidebar"
    class="
        fixed inset-0 z-50
        bg-black/40
        hidden lg:hidden
    "
>

    <div class="
        w-72 h-full
        bg-white
        p-5
    ">

        <!-- HEADER -->

        <div class="
            flex items-center justify-between
            mb-8
        ">

            <div>

                <h2 class="
                    text-2xl font-black
                ">
                    AI COS
                </h2>

                <p class="
                    text-sm text-gray-500
                ">
                    Dashboard
                </p>

            </div>

            <button
                id="close-mobile-sidebar"
                class="
                    w-10 h-10
                    rounded-xl
                    bg-gray-100
                "
            >
                ✕
            </button>

        </div>

        <!-- MOBILE MENU -->

        <div class="
            flex flex-col gap-2
        ">

            <a
                href="{% url 'dashboard-home' %}"
                class="
                    px-4 py-3
                    rounded-2xl
                    bg-gray-100
                    font-medium
                "
            >
                Dashboard
            </a>

            <a
                href="/api/v1/generator/"
                class="
                    px-4 py-3
                    rounded-2xl
                    hover:bg-gray-100
                "
            >
                Generator
            </a>

            <a
                href="/api/publisher/"
                class="
                    px-4 py-3
                    rounded-2xl
                    hover:bg-gray-100
                "
            >
                Publisher
            </a>

            <a
                href="/api/monitoring/"
                class="
                    px-4 py-3
                    rounded-2xl
                    hover:bg-gray-100
                "
            >
                Monitoring
            </a>

            <a
                href="/admin/"
                class="
                    px-4 py-3
                    rounded-2xl
                    hover:bg-gray-100
                "
            >
                Admin
            </a>

            <a
                href="{% url 'logout' %}"
                class="
                    mt-4
                    px-4 py-3
                    rounded-2xl
                    bg-red-50
                    text-red-600
                    text-center
                    font-medium
                "
            >
                Logout
            </a>

        </div>

    </div>

</div>

<!-- MOBILE SCRIPT -->

<script>

const mobileSidebarButton =
    document.getElementById(
        "mobile-sidebar-button"
    );

const mobileSidebar =
    document.getElementById(
        "mobile-sidebar"
    );

const closeMobileSidebar =
    document.getElementById(
        "close-mobile-sidebar"
    );

if (
    mobileSidebarButton &&
    mobileSidebar
){

    mobileSidebarButton.addEventListener(

        "click",

        function(){

            mobileSidebar.classList.remove(
                "hidden"
            );
        }
    );
}

if (
    closeMobileSidebar &&
    mobileSidebar
){

    closeMobileSidebar.addEventListener(

        "click",

        function(){

            mobileSidebar.classList.add(
                "hidden"
            );
        }
    );
}

</script>
