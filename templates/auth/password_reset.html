<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Reset Password
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-6">

    <div class="bg-white rounded-3xl shadow-sm border border-gray-200 p-10">

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-gray-900">
                Reset Password
            </h1>

            <p class="text-gray-500 mt-2">
                Enter your email to receive reset link
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-6">

                <label class="block text-sm font-medium text-gray-700 mb-2">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black"
                    required
                >

            </div>

            <button
                type="submit"
                class="w-full bg-black text-white py-3 rounded-2xl font-semibold hover:opacity-90 transition"
            >
                Send Reset Link
            </button>

        </form>

        <div class="mt-5 text-center">

            <a
                href="/login/"
                class="text-sm text-gray-500 hover:text-black transition"
            >
                Back to Login
            </a>

        </div>

    </div>

</div>

</body>

</html>
