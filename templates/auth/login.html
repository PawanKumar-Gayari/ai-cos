<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        AI COS Login
    </title>

    <meta
        name="description"
        content="Secure AI COS Dashboard Login"
    >

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 text-gray-900">

<!-- MAIN -->

<div class="min-h-screen flex flex-col">

    <!-- NAVBAR -->

    <!-- LOGIN SECTION -->

    <div class="flex-1 flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-md">

            <!-- LOGIN CARD -->

            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-200 p-8 sm:p-10">

                <!-- HEADER -->

                <div class="text-center mb-8">

                    <div class="inline-flex items-center gap-3 bg-green-50 border border-green-200 px-4 py-2 rounded-full mb-6">

                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>

                        <span class="text-sm font-semibold text-green-700">
                            Secure Infrastructure
                        </span>

                    </div>

                    <h1 class="text-5xl font-black tracking-tight text-gray-900">
                        AI COS
                    </h1>

                    <p class="text-gray-500 mt-4 text-lg leading-relaxed">

                        Secure dashboard access for
                        AI infrastructure management.

                    </p>

                </div>

                <!-- ERROR -->

                {% if form.errors %}

                    <div class="mb-6 bg-red-100 text-red-700 px-5 py-4 rounded-2xl text-sm font-semibold">

                        Invalid username or password.

                    </div>

                {% endif %}

                <!-- LOGIN FORM -->

                <form method="POST">

                    {% csrf_token %}

                    <!-- USERNAME -->

                    <div class="mb-5">

                        <label class="block text-sm font-semibold text-gray-700 mb-3">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            placeholder="Enter username"
                            class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black"
                            required
                        >

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-6">

                        <label class="block text-sm font-semibold text-gray-700 mb-3">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            placeholder="Enter password"
                            class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black"
                            required
                        >

                    </div>

                    <!-- BUTTON -->

                    <button
                        type="submit"
                        class="w-full bg-black text-white py-4 rounded-2xl font-bold hover:bg-gray-900 transition"
                    >
                        Login to Dashboard
                    </button>

                </form>

                <!-- FORGOT PASSWORD -->

                <div class="mt-6 text-center">

                    <a
                        href="/password-reset/"
                        class="text-sm font-medium text-gray-500 hover:text-black transition"
                    >
                        Forgot Password?
                    </a>

                </div>

            </div>

            <!-- FOOTER -->

            <div class="mt-8 text-center space-y-2">

                <p class="text-sm text-gray-400">

                    AI COS Secure Control Panel

                </p>

                <p class="text-sm text-gray-400">

                    Made with ❤️ by

                    <span class="font-semibold text-gray-700">
                        Pawan Kumar Gayari
                    </span>

                </p>

            </div>

        </div>

    </div>

</div>

</body>

</html>
